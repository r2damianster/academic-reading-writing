<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Syllabus - Overview</title>
    <link rel="stylesheet" href="../css/modules.css">
    <script src="../js/nav.js"></script>
    <style>
        .unit-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .unit-card:hover { transform: translateX(5px); border-color: #3498db; }
        .unit-info h3 { margin: 0 0 5px 0; color: #1a2a6c; }
        .unit-info p  { margin: 0; font-size: 0.9rem; color: #666; }
        .btn-start {
            background: #3498db; color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            font-size: 0.85rem; white-space: nowrap;
        }
        .intro-box {
            background: #eef2f7; padding: 20px; border-radius: 10px;
            margin-bottom: 30px; line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="lesson-container">
    <h2>Module 01: Core Syllabus</h2>
    <div class="intro-box">
        <p>This module covers the official course syllabus, from essay writing to research papers and academic integrity. Work through each unit in order for the best learning experience.</p>
    </div>
    <h3>Units</h3>
    <div id="cardContainer"></div>
</div>
<script>
    const section = MENU.find(item => item.label === '01. Core Syllabus');
    const container = document.getElementById('cardContainer');
    section.children.forEach(unit => {
        const path = unit.path.replace('modules/01-core-syllabus/', '');
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.innerHTML = `
            <div class="unit-info"><h3>${unit.label}</h3></div>
            <a href="${path}" class="btn-start">Enter →</a>
        `;
        container.appendChild(card);
    });
</script>
</body>
</html>
