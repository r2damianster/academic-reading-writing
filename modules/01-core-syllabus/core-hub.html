<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub - Under Construction</title>
    <link rel="stylesheet" href="../../css/modules.css">
    <style>
        .construction-container {
            text-align: center;
            padding: 50px 20px;
            background: #fdfcf0;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            margin-top: 20px;
        }
        .icon { font-size: 3rem; margin-bottom: 20px; }
        .hub-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
            opacity: 0.6; /* Indica que aún no están listos */
        }
        .card-locked {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            color: #7f8c8d;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="lesson-container">
    <div class="construction-container">
        <div class="icon">🚧</div>
        <h2>Module Under Development</h2>
        <p>We are currently polishing the advanced lessons for this section. <br> 
           Please complete the <strong>Fundamentals</strong> module first.</p>
    </div>

    <div class="hub-nav">
        <div class="card-locked">🔒 Content Loading...</div>
        <div class="card-locked">🔒 Exercises Pending</div>
        <div class="card-locked">🔒 Final Quiz</div>
    </div>
</div>

</body>
</html>
