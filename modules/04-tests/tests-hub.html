<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests</title>
    <link rel="stylesheet" href="/css/modules.css">
    <script src="/js/nav.js"></script>
    <style>
        .module-card {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
            padding: 20px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center; transition: transform 0.2s;
        }
        .module-card:hover { transform: translateX(5px); border-color: #3498db; }
        .module-info h3 { margin: 0 0 5px 0; color: #1a2a6c; }
        .btn-start {
            background: #e74c3c; color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            font-size: 0.85rem; white-space: nowrap;
        }
        .intro-box {
            background: #fdf2f2; padding: 20px; border-radius: 10px;
            margin-bottom: 30px; line-height: 1.6; border-left: 4px solid #e74c3c;
        }
    </style>
</head>
<body>
<div class="lesson-container">
    <h2>Module 04: Tests</h2>
    <div class="intro-box">
        <p>These are formal assessments that evaluate your progress across the course. Each test covers a major section of the syllabus. Complete all lessons in the corresponding module before attempting each test.</p>
    </div>
    <h3>Available Tests</h3>
    <div id="cardContainer"></div>
</div>
<script>
    const section = MENU.find(i => i.label === '04. Tests');
    const container = document.getElementById('cardContainer');
    section.children.forEach(lesson => {
        const path = lesson.path.replace('modules/04-tests/', '');
        const card = document.createElement('div');
        card.className = 'module-card';
        card.innerHTML = `
            <div class="module-info"><h3>${lesson.label}</h3></div>
            <a href="${path}" class="btn-start">Take Test →</a>
        `;
        container.appendChild(card);
    });
</script>
</body>
</html>
