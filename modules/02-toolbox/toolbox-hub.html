<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <link rel="stylesheet" href="../../css/modules.css">
    <script src="../../js/nav.js"></script>
    <style>
        .module-card {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
            padding: 20px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center; transition: transform 0.2s;
        }
        .module-card:hover { transform: translateX(5px); border-color: #3498db; }
        .module-info h3 { margin: 0 0 5px 0; color: #1a2a6c; }
        .module-info p  { margin: 0; font-size: 0.9rem; color: #666; }
        .btn-start {
            background: #3498db; color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            font-size: 0.85rem; white-space: nowrap;
        }
        .intro-box {
            background: #eef2f7; padding: 20px; border-radius: 10px;
            margin-bottom: 30px; line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="lesson-container">
    <h2>Module 02: Toolbox</h2>
    <div class="intro-box">
        <p>The Toolbox contains targeted practice on grammar, connectors, and vocabulary. Use these lessons to strengthen specific language skills that support your academic writing.</p>
    </div>
    <h3>Categories</h3>
    <div id="cardContainer"></div>
</div>

<script>
    // Esperamos a que todo cargue para asegurar que MENU exista
    window.addEventListener('load', () => {
        if (typeof MENU !== 'undefined') {
            const section = MENU.find(i => i.label === '02. Toolbox');
            const container = document.getElementById('cardContainer');

            // Definimos las rutas relativas para las sub-hubs
            const hubPaths = {
                'Grammar':    'grammar/grammar-hub.html',
                'Connectors': 'connectors/connectors-hub.html',
                'Vocabulary': 'vocabulary/vocabulary-hub.html'
            };

            if (section && section.children) {
                section.children.forEach(category => {
                    const card = document.createElement('div');
                    card.className = 'module-card';
                    card.innerHTML = `
                        <div class="module-info">
                            <h3>${category.label}</h3>
                            <p>${category.children.length} lesson${category.children.length > 1 ? 's' : ''}</p>
                        </div>
                        <a href="${hubPaths[category.label]}" class="btn-start">Enter →</a>
                    `;
                    container.appendChild(card);
                });
            }
        } else {
            console.error("nav.js no se cargó correctamente.");
        }
    });
</script>
</body>
</html>
