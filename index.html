<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Reading & Writing — ULEAM</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Flyout backdrop -->
    <div id="flyoutBackdrop" class="flyout-backdrop" onclick="closeFlyout()"></div>

    <!-- Search modal -->
    <div id="searchModal" class="search-modal-backdrop" onclick="closeSearch(event)">
        <div class="search-modal-box" onclick="event.stopPropagation()">
            <div class="search-modal-input-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-modal-icon"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input id="searchModalInput" class="search-modal-input"
                       placeholder="Search any lesson…" autocomplete="off"
                       oninput="runSearch(this.value)" onkeydown="searchKeyNav(event)">
                <button class="search-modal-esc" onclick="closeSearch()">Esc</button>
            </div>
            <div id="searchModalResults" class="search-modal-results"></div>
        </div>
    </div>

    <!-- Flyout: panel izquierdo (grupos) + panel derecho (ítems) -->
    <div id="flyoutPanel" class="flyout-panel">

        <!-- Panel L: sección + lista de grupos -->
        <div class="flyout-l" id="flyoutL">
            <div class="flyout-header">
                <span class="flyout-header-title" id="flyoutTitle">Menu</span>
                <button class="flyout-close" onclick="closeFlyout()">×</button>
            </div>
            <div class="flyout-l-scroll" id="flyoutLScroll"></div>
        </div>

        <!-- Panel R: ítems del grupo seleccionado -->
        <div class="flyout-r" id="flyoutR">
            <div class="flyout-r-header" id="flyoutRHeader"></div>
            <div class="flyout-r-scroll" id="flyoutRScroll"></div>
        </div>

    </div>

    <!-- Welcome Modal (sin cambios) -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content">
            <div id="step1">
                <h2>Institutional Access</h2>
                <p style="font-size:0.9rem;color:#666;margin-bottom:20px;">Enter your institutional email to access your personalized workspace.</p>
                <input type="email" id="inputEmail" placeholder="user@uleam.edu.ec  OR  user@live.uleam.edu.ec"
                       style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
                <p id="step1Error" style="color:#e74c3c;font-size:0.82rem;margin-top:8px;min-height:18px;text-align:center;"></p>
                <button onclick="goToStep2()" class="btn-primary" style="width:100%;">Next →</button>
            </div>
            <div id="step2" style="display:none;">
                <h2>Session Details</h2>
                <p style="font-size:0.9rem;color:#666;margin-bottom:16px;">Help us contextualize your activity today.</p>
                <label style="font-size:0.85rem;font-weight:bold;color:#2980b9;display:block;margin-bottom:6px;">★ Session Type:</label>
                <select id="inputPracticeType" style="border:2px solid #2980b9;width:100%;padding:10px;border-radius:8px;margin-bottom:20px;">
                    <option value="In-class practice" selected>In-class practice</option>
                    <option value="Personal practice">Personal practice</option>
                    <option value="Exam preparation">Exam preparation</option>
                    <option value="Other">Other</option>
                </select>
                <div class="consent-box" style="background:#f9f9f9;padding:15px;border-radius:8px;border-left:4px solid #2980b9;">
                    <label class="consent-label" style="display:flex;gap:10px;cursor:pointer;font-size:0.85rem;">
                        <input type="checkbox" id="inputConsent" checked>
                        <span>I understand that my activity is monitored for academic integrity and course improvement.</span>
                    </label>
                </div>
                <div class="consent-box" style="margin-top:10px;background:#f9f9f9;padding:15px;border-radius:8px;border-left:4px solid #27ae60;">
                    <label class="consent-label" style="display:flex;gap:10px;cursor:pointer;font-size:0.85rem;">
                        <input type="checkbox" id="inputResearchConsent" checked>
                        <span>I authorize the use of my anonymized writing samples for Dr. Arturo Rodriguez's research project.</span>
                    </label>
                </div>
                <p id="step2Error" style="color:#e74c3c;font-size:0.82rem;margin-top:8px;min-height:18px;text-align:center;"></p>
                <div style="display:flex;gap:10px;margin-top:16px;">
                    <button onclick="goToStep1()" class="btn-secondary" style="flex:1;">← Back</button>
                    <button onclick="saveAndStart()" class="btn-primary" style="flex:2;">Start Learning</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App layout -->
    <div class="app-container">

        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>AW</h1>
                <p id="studentDisplay">Loading…</p>
            </div>
            <ul class="nav-menu" id="navMenu"></ul>
            <div class="sidebar-footer">
                <!-- Search -->
                <button class="sf-btn" onclick="openSearch()" title="Search lessons">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <!-- Ethics & Privacy -->
                <button class="sf-btn" onclick="loadPage('modules/ethics-and-data.html')" title="Ethics & Privacy Policy">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </button>
                <!-- Download report -->
                <button class="sf-btn sf-btn--accent" onclick="generateReport()" title="Download & Send Progress">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <!-- Logout -->
                <button onclick="resetApp()" class="sf-btn sf-btn--ghost" title="Not you? Logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </nav>

        <main class="content-area">
            <iframe name="contentFrame" id="contentFrame" src="welcome-content.html" frameborder="0"
                style="width:100%;height:100%;min-height:100vh;"></iframe>
        </main>
    </div>

    <script>
        function goToStep2() {
            const email = document.getElementById('inputEmail').value.trim();
            const err = document.getElementById('step1Error');
            if (!email) { err.textContent = 'Email is required.'; return; }
            const emailPattern = /^[a-zA-Z0-9._%+-]+@(live\.)?uleam\.edu\.ec$/;
            if (!emailPattern.test(email)) { err.textContent = 'Please use your @uleam.edu.ec account.'; return; }
            err.textContent = '';
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }
        function goToStep1() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>

    <script src="js/nav.js?v=1.0"></script>
    <script src="js/auth.js?v=1.4"></script>
    <script src="js/essay-handler.js?v=1.2"></script>
    <script src="js/activity-tracker.js?v=1.0"></script>
    <script src="js/navigation.js?v=1.2"></script>
    <script src="js/report.js?v=1.2"></script>

    <!-- =====================================================================
         FLYOUT SYSTEM — Doble panel (grupos → ítems)
         No modifica MENU, nav.js, hubs, ni loadPage().
         ===================================================================== -->
    <script>
    (function () {

        const ICONS = {
            'Main':             '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>',
            '00. Fundamentals': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>',
            '01. Core Syllabus':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>',
            '02. Toolbox':      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>',
            '03. Peer System':  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>',
            '04. Tests':        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>'
        };

        const SHORT = {
            'Main':'Main', '00. Fundamentals':'Fund.', '01. Core Syllabus':'Core',
            '02. Toolbox':'Tools', '03. Peer System':'Peer', '04. Tests':'Tests'
        };

        /* ---- Build slim icon rail ---- */
        function buildSlimMenu() {
            const ul = document.getElementById('navMenu');
            if (!ul || typeof MENU === 'undefined') return;
            ul.innerHTML = '';
            MENU.forEach(item => {
                const li = document.createElement('li');
                li.className = 'menu-item';
                const btn = document.createElement('button');
                btn.className = 'section-header';
                btn.title = item.label;
                btn.innerHTML = (ICONS[item.label] || ICONS['Main']) +
                    `<span class="nav-label">${SHORT[item.label] || item.label.split('.')[0]}</span>`;

                const hasChildren = item.children && item.children.length > 0;
                btn.onclick = () => {
                    if (hasChildren) {
                        openFlyout(item, btn);
                    } else {
                        if (item.path) loadPage(item.path);
                        setActive(btn);
                        closeFlyout();
                    }
                };
                li.appendChild(btn);
                ul.appendChild(li);
            });
        }

        function setActive(btn) {
            document.querySelectorAll('.section-header').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }

        /* ---- Open flyout with section data ---- */
        function openFlyout(item, btn) {
            setActive(btn);
            document.getElementById('flyoutTitle').textContent = item.label;

            const lScroll = document.getElementById('flyoutLScroll');
            lScroll.innerHTML = '';

            // Hub button at top of left panel
            if (item.path) {
                const hubBtn = document.createElement('button');
                hubBtn.className = 'fl-hub';
                hubBtn.textContent = 'Overview →';
                hubBtn.onclick = () => { loadPage(item.path); closeFlyout(); };
                lScroll.appendChild(hubBtn);
            }

            // Separator label
            const sep = document.createElement('div');
            sep.className = 'fl-sep';
            sep.textContent = 'Topics';
            lScroll.appendChild(sep);

            // Check if children have grandchildren (need group rows) or are flat leaves
            const hasGroups = item.children.some(c => c.children && c.children.length > 0);

            if (hasGroups) {
                // Each child is a "group" row — click opens its leaves in right panel
                item.children.forEach((child, idx) => {
                    const groupBtn = document.createElement('button');
                    groupBtn.className = 'fl-group';
                    groupBtn.dataset.idx = idx;
                    groupBtn.innerHTML = `<span>${child.label}</span><span class="fl-arrow">›</span>`;
                    groupBtn.onclick = () => selectGroup(item, child, groupBtn);
                    lScroll.appendChild(groupBtn);
                });
                // Auto-select first group
                const firstGroupBtn = lScroll.querySelector('.fl-group');
                if (firstGroupBtn) selectGroup(item, item.children[0], firstGroupBtn);

            } else {
                // Flat list — no right panel needed, hide it
                document.getElementById('flyoutR').style.display = 'none';
                item.children.forEach(child => {
                    const leafBtn = document.createElement('button');
                    leafBtn.className = 'fl-leaf';
                    leafBtn.textContent = child.label;
                    leafBtn.onclick = () => { loadPage(child.path); closeFlyout(); };
                    lScroll.appendChild(leafBtn);
                });
            }

            document.getElementById('flyoutPanel').classList.add('open');
            document.getElementById('flyoutBackdrop').classList.add('open');
        }

        /* ---- Select a group → populate right panel ---- */
        function selectGroup(section, group, btn) {
            // Highlight active group
            document.querySelectorAll('.fl-group').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const rPanel = document.getElementById('flyoutR');
            const rHeader = document.getElementById('flyoutRHeader');
            const rScroll = document.getElementById('flyoutRScroll');

            rPanel.style.display = 'flex';
            rHeader.textContent = group.label;
            rScroll.innerHTML = '';

            // Sub-hub link if group has its own path
            if (group.path) {
                const subHub = document.createElement('button');
                subHub.className = 'fr-hub';
                subHub.textContent = 'Hub →';
                subHub.onclick = () => { loadPage(group.path); closeFlyout(); };
                rScroll.appendChild(subHub);
            }

            // Leaves
            const leaves = group.children || [];
            leaves.forEach(leaf => {
                const leafBtn = document.createElement('button');
                leafBtn.className = 'fr-leaf';
                leafBtn.textContent = leaf.label;
                leafBtn.onclick = () => { loadPage(leaf.path); closeFlyout(); };
                rScroll.appendChild(leafBtn);
            });
        }

        /* ---- Close ---- */
        window.closeFlyout = function () {
            document.getElementById('flyoutPanel').classList.remove('open');
            document.getElementById('flyoutBackdrop').classList.remove('open');
        };

        document.addEventListener('DOMContentLoaded', buildSlimMenu);

    })();
    </script>

    <!-- =====================================================================
         SEARCH SYSTEM
         ===================================================================== -->
    <script>
    (function () {

        function buildIndex() {
            if (typeof MENU === 'undefined') return [];
            const index = [];
            function walk(items, breadcrumb) {
                items.forEach(item => {
                    if (item.path && item.label !== 'Main') {
                        index.push({ label: item.label, path: item.path, crumb: breadcrumb });
                    }
                    if (item.children) walk(item.children, breadcrumb ? breadcrumb + ' \u203a ' + item.label : item.label);
                });
            }
            walk(MENU, '');
            return index;
        }

        let INDEX = [];
        let activeIdx = -1;

        window.openSearch = function () {
            if (!INDEX.length) INDEX = buildIndex();
            document.getElementById('searchModal').classList.add('open');
            const input = document.getElementById('searchModalInput');
            input.value = '';
            document.getElementById('searchModalResults').innerHTML = '';
            activeIdx = -1;
            setTimeout(() => input.focus(), 60);
            document.addEventListener('keydown', escListener);
        };

        function escListener(e) { if (e.key === 'Escape') _closeSearch(); }

        window.closeSearch = function (e) {
            if (e && e.target !== document.getElementById('searchModal')) return;
            _closeSearch();
        };

        function _closeSearch() {
            document.getElementById('searchModal').classList.remove('open');
            document.removeEventListener('keydown', escListener);
        }

        window.runSearch = function (q) {
            activeIdx = -1;
            const box = document.getElementById('searchModalResults');
            if (!q.trim()) { box.innerHTML = ''; return; }
            const terms = q.toLowerCase().split(/\s+/);
            const hits = INDEX.filter(item =>
                terms.every(t => item.label.toLowerCase().includes(t) || item.crumb.toLowerCase().includes(t))
            ).slice(0, 12);

            if (!hits.length) {
                box.innerHTML = '<div class="sr-empty">No results for &ldquo;' + q + '&rdquo;</div>';
                return;
            }

            const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
            box.innerHTML = hits.map((h, i) => {
                const hl = h.label.replace(re, '<mark>$1</mark>');
                const crumb = h.crumb ? '<span class="sr-crumb">' + h.crumb + '</span>' : '';
                return '<button class="sr-item" data-path="' + h.path + '" onclick="searchGo(\'' + h.path + '\')" onmouseenter="setSearchActive(' + i + ')">' +
                    crumb + '<span class="sr-label">' + hl + '</span></button>';
            }).join('');
        };

        window.setSearchActive = function (i) {
            activeIdx = i;
            document.querySelectorAll('.sr-item').forEach((el, j) => el.classList.toggle('active', j === i));
        };

        window.searchKeyNav = function (e) {
            const items = document.querySelectorAll('.sr-item');
            if (!items.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIdx = Math.min(activeIdx + 1, items.length - 1);
                window.setSearchActive(activeIdx);
                items[activeIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIdx = Math.max(activeIdx - 1, 0);
                window.setSearchActive(activeIdx);
                items[activeIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter') {
                const active = document.querySelector('.sr-item.active');
                if (active) window.searchGo(active.dataset.path);
                else if (items.length) window.searchGo(items[0].dataset.path);
            }
        };

        window.searchGo = function (path) {
            loadPage(path);
            _closeSearch();
            if (typeof closeFlyout === 'function') closeFlyout();
        };

    })();
    </script>

</body>
</html>
