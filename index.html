<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Reading & Writing</title>
    <link rel="stylesheet" href="css/main.css?v=1.4">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="welcomeModal" class="modal">
        <div class="modal-content">

            <!-- ── PASO 1 ── -->
            <div id="step1">
                <h2>Welcome to the Course</h2>
                <p style="font-size:0.9rem;color:#666;margin-bottom:16px;">
                    Please complete your details. Only institutional accounts are permitted.
                </p>

                <input type="text"  id="inputName"  placeholder="Full Name">
                <input type="email" id="inputEmail" placeholder="Institutional Email">

                <select id="inputCourse">
                    <option value="Academic Reading &amp; Writing II" selected>Academic Reading &amp; Writing II</option>
                    <option value="Academic Reading &amp; Writing I">Academic Reading &amp; Writing I</option>
                </select>

                <select id="inputMajor">
                    <option value="Student" selected>Student</option>
                    <option value="Teacher">Teacher</option>
                </select>

                <select id="inputInstitution">
                    <option value="ULEAM" selected>Yes — ULEAM</option>
                    <option value="Other">No — Other institution</option>
                </select>

                <p id="step1Error" style="color:#e74c3c;font-size:0.82rem;margin-top:8px;min-height:18px;text-align:center;"></p>
                <button onclick="goToStep2()">Next →</button>
            </div>

            <!-- ── PASO 2 ── -->
            <div id="step2" style="display:none;">
                <h2>Almost there!</h2>
                <p style="font-size:0.9rem;color:#666;margin-bottom:16px;">
                    Tell us how you are using this platform today.
                </p>

                <label style="font-size:0.85rem;font-weight:bold;color:#e74c3c;display:block;margin-bottom:6px;">
                    ★ What type of practice is this session?
                </label>
                <select id="inputPracticeType" style="border:2px solid #e74c3c;">
                    <option value="In-class practice" selected>In-class practice</option>
                    <option value="Personal practice">Personal practice</option>
                    <option value="Exam preparation">Exam preparation</option>
                    <option value="Other">Other</option>
                </select>

                <div class="consent-box" style="margin-top:20px;">
                    <label class="consent-label">
                        <input type="checkbox" id="inputConsent" checked>
                        <span>
                            I understand that my activity is monitored for academic integrity and course improvement.
                            This data is accessible to my instructor for educational assessment.
                        </span>
                    </label>
                </div>

                <div class="consent-box" style="margin-top:10px;">
                    <label class="consent-label">
                        <input type="checkbox" id="inputResearchConsent" checked>
                        <span>
                            I authorize the use of my anonymized writing samples and activity data for academic research and publication purposes.
                        </span>
                    </label>
                </div>

                <p id="step2Error" style="color:#e74c3c;font-size:0.82rem;margin-top:8px;min-height:18px;text-align:center;"></p>

                <div style="display:flex;gap:10px;margin-top:16px;">
                    <button onclick="goToStep1()" style="background:#95a5a6;flex:1;">← Back</button>
                    <button onclick="saveAndStart()" style="flex:2;">Start Learning</button>
                </div>
            </div>

        </div>
    </div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>Academic Reading & Writing</h1>
                <p id="studentDisplay">Student: ...</p>
            </div>

            <ul class="nav-menu" id="navMenu"></ul>

            <div class="sidebar-footer">
                <a href="#" onclick="loadPage('modules/ethics-and-data.html')"
                    style="color:#bdc3c7;font-size:0.8rem;display:block;margin-bottom:10px;text-align:center;text-decoration:none;">
                    🔒 Ethics & Privacy Policy
                </a>
                <button class="btn-report" onclick="generateReport()">Download & Send Progress</button>
                <button onclick="resetApp()"
                    style="background:none;border:none;color:#95a5a6;font-size:0.75rem;margin-top:15px;cursor:pointer;width:100%;text-decoration:underline;">
                    Not you? Change Student
                </button>
            </div>
        </nav>

        <main class="content-area">
            <iframe name="contentFrame" id="contentFrame" src="welcome-content.html" frameborder="0"
                style="width:100%;height:100%;min-height:100vh;"></iframe>
        </main>
    </div>

    <script>
        function goToStep2() {
            const name  = document.getElementById('inputName').value.trim();
            const email = document.getElementById('inputEmail').value.trim();
            const err   = document.getElementById('step1Error');

            if (!name || !email) {
                err.textContent = 'Please complete all fields before continuing.';
                return;
            }
            const emailPattern = /^[a-zA-Z0-9._%+-]+@(live\.)?uleam\.edu\.ec$/;
            if (!emailPattern.test(email)) {
                err.textContent = 'Only institutional emails (@uleam.edu.ec or @live.uleam.edu.ec) are accepted.';
                return;
            }
            err.textContent = '';
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function goToStep1() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }
    </script>

    <script src="js/nav.js?v=1.0"></script>
    <script src="js/auth.js?v=1.3"></script>
    <script src="js/essay-handler.js?v=1.2"></script>
    <script src="js/activity-tracker.js?v=1.0"></script>
    <script src="js/interactions-handler.js?v=1.0"></script>
    <script src="js/navigation.js?v=1.2"></script>
    <script src="js/config.js?v=1.0"></script>
    <script src="js/ui-tools.js?v=1.3"></script>
    <script src="js/report.js?v=1.2"></script>
</body>
</html>
