<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar</title>
    <link rel="stylesheet" href="/css/modules.css">
    <script src="/js/nav.js"></script>
    <style>
        .module-card {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
            padding: 20px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center; transition: transform 0.2s;
        }
        .module-card:hover { transform: translateX(5px); border-color: #3498db; }
        .module-info h3 { margin: 0 0 5px 0; color: #1a2a6c; }
        .btn-start {
            background: #3498db; color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            font-size: 0.85rem; white-space: nowrap;
        }
        .intro-box {
            background: #eef2f7; padding: 20px; border-radius: 10px;
            margin-bottom: 30px; line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="lesson-container">
    <h2>Toolbox: Grammar</h2>
    <div class="intro-box">
        <p>Targeted grammar lessons for academic writing. Each lesson focuses on a specific structure commonly used in university-level texts.</p>
    </div>
    <h3>Lessons</h3>
    <div id="cardContainer"></div>
</div>
<script>
    const section  = MENU.find(i => i.label === '02. Toolbox');
    const category = section.children.find(i => i.label === 'Grammar');
    const container = document.getElementById('cardContainer');
    category.children.forEach(lesson => {
        const path = lesson.path.replace('modules/02-toolbox/grammar/', '');
        const card = document.createElement('div');
        card.className = 'module-card';
        card.innerHTML = `
            <div class="module-info"><h3>${lesson.label}</h3></div>
            <a href="${path}" class="btn-start">Start →</a>
        `;
        container.appendChild(card);
    });
</script>
</body>
</html>
